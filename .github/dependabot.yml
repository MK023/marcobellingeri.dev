version: 2
updates:
  # dipendenze npm del progetto Astro
  - package-ecosystem: "npm"
    directory: "/astro-project"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # pin/aggiornamento delle GitHub Actions usate nei workflow
  # (directory "/" = .github/workflows alla root, dove vivono da quando
  # monthly-issue fu spostato dalla vecchia posizione in astro-project)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
