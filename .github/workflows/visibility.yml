name: Visibility monitor

# Monitor discoverability: SEO (Google Search Console) + AEO (Perplexity Sonar),
# referto prescrittivo, storico su Supabase. Gira il lunedi' alle 06:00 UTC
# (settimanale, in linea col radar competitor mensile). I secret sono
# sincronizzati nei GitHub Actions secrets da Doppler (config prd).
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {} # run manuale on-demand, senza aspettare il lunedi'

permissions:
  contents: read # l'engine scrive sul DB (Supabase), non sul repo
  issues: write # per l'issue automatica on-failure

jobs:
  visibility:
    runs-on: ubuntu-latest
    steps:
      # pin per SHA (supply-chain): il tag e' mobile, il commit no
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Run visibility monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node engine/visibility.mjs # zero dipendenze npm: nessun install
      - name: Apri issue se il monitor fallisce
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "Visibility monitor fallito ($(date -u +%F))" \
            --body "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — trace su Langfuse (visibility-monitor)."

      # Vedi magazine-ingest.yml: l'issue on-failure copre il job che parte e
      # fallisce, non il job che non parte. Da agosto il repo puo' restare
      # silenzioso (networking) e i 60gg di inattivita' spengono gli schedule:
      # questo check-in e' cio' che se ne accorge.
      - name: Check-in Sentry (il cron e' vivo)
        if: always()
        env:
          ESITO: ${{ job.status }}
        run: |
          stato=ok
          [ "$ESITO" = "success" ] || stato=error
          curl -sS -m 10 -X POST \
            "https://o4511713634484224.ingest.de.sentry.io/api/4511714029273168/cron/visibility/ffcac5d108001982eb70aa431c32af75/" \
            -H 'Content-Type: application/json' \
            -d "{\"monitor_config\":{\"schedule\":{\"type\":\"crontab\",\"value\":\"0 6 * * 1\"},\"timezone\":\"UTC\",\"checkin_margin\":120,\"max_runtime\":20},\"status\":\"$stato\"}" \
            && echo "check-in Sentry: $stato" \
            || echo "check-in Sentry non riuscito — il monitor resta valido"
          exit 0
