name: Site CI

# Il frontend non aveva un gate: la build passava verde anche con la CSP rotta,
# perché `astro build` non applica public/_headers e non guarda il risultato.
# Qui la build è solo il primo passo; i test girano su dist/ e verificano ciò che
# un browser vedrebbe davvero:
#  - ogni <script> inline ha il suo hash nella CSP (incluso l'is:inline del tema,
#    che Astro non hasha e il cui hash sta a mano in astro.config.mjs)
#  - _headers non dichiara una CSP che annulli quella del <meta>
#  - l'Archivio compare se e solo se esiste un numero pubblicato
#
# Nessun dato dell'evento (titoli PR, messaggi di commit, head_ref) entra in un
# `run:`: gli unici input sono path statici.
# Nessun filtro per path: è un check obbligatorio nel ruleset di main, e un
# workflow che non parte non riporta nulla — la PR resterebbe in attesa per sempre.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-e-csp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-project/package-lock.json
      - name: Installa
        working-directory: astro-project
        run: npm ci
      - name: Build
        working-directory: astro-project
        run: npm run build
      - name: CSP + sezioni (gira su dist/)
        working-directory: astro-project
        run: npm run test:csp

  # Analisi Sonar sulle sole PR: il commento arriva mentre la modifica si può ancora
  # cambiare. Sul push a main non si ripete — quel commit lo rianalizza il workflow
  # Deploy, dove il gate blocca la pubblicazione. Qui niente `qualitygate.wait`: sulla
  # PR il blocco lo fa il check di Sonar, non un job che muore.
  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-project/package-lock.json
      - name: Installa
        working-directory: astro-project
        run: npm ci
      - name: Coverage
        run: |
          npm run test:coverage --prefix astro-project
          npm run test:coverage --prefix engine
      - name: Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
