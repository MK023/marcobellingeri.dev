name: Site CI

# Il frontend non aveva un gate: la build passava verde anche con la CSP rotta,
# perché `astro build` non applica public/_headers e non guarda il risultato.
# Qui la build è solo il primo passo; i test girano su dist/ e verificano ciò che
# un browser vedrebbe davvero:
#  - ogni <script> inline ha il suo hash nella CSP (incluso l'is:inline del tema,
#    che Astro non hasha e il cui hash sta a mano in astro.config.mjs)
#  - _headers non dichiara una CSP che annulli quella del <meta>
#  - l'Archivio compare se e solo se esiste un numero pubblicato
#
# Nessun dato dell'evento (titoli PR, messaggi di commit, head_ref) entra in un
# `run:`: gli unici input sono path statici.
# Nessun filtro per path: è un check obbligatorio nel ruleset di main, e un
# workflow che non parte non riporta nulla — la PR resterebbe in attesa per sempre.
on:
  pull_request:
  push:
    branches: [main]
  # Le PR create col GITHUB_TOKEN (cron Edicola card) non triggerano
  # `pull_request`: il workflow le lancia via dispatch sul branch della card.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-e-csp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-project/package-lock.json
      - name: Installa
        working-directory: astro-project
        run: npm ci

      # Prima del build: sono le uniche due reti che guardano i file .astro.
      # SonarCloud non ha un parser per Astro — 20 file e ~2800 righe (piu' di tutto
      # cio' che Sonar analizza) passavano senza alcun controllo statico, e li' dentro
      # sta la logica lato browser: form di contatto, palette, terminale.
      - name: Type-check (astro check)
        working-directory: astro-project
        run: npm run check
      - name: Lint (ESLint, copre i .astro)
        working-directory: astro-project
        run: npm run lint

      - name: Build
        working-directory: astro-project
        run: npm run build
      - name: CSP + sezioni (gira su dist/)
        working-directory: astro-project
        run: npm run test:csp

  # Analisi Sonar sulle sole PR: il commento arriva mentre la modifica si può ancora
  # cambiare. Sul push a main non si ripete — quel commit lo rianalizza il workflow
  # Deploy, dove il gate blocca la pubblicazione. Qui niente `qualitygate.wait`: sulla
  # PR il blocco lo fa il check di Sonar, non un job che muore.
  # Escluso Dependabot: GitHub non passa i secret del repository alle sue PR (difesa
  # contro una PR di dipendenze che tenti di esfiltrare i token), quindi SONAR_TOKEN
  # arriva vuoto e lo scan muore con "Not authorized" — su ogni bump, per progettazione.
  # Non è un gate indebolito, è un gate che su quelle PR non può tornare verde.
  # Stesso trattamento già dato a gitleaks e CodeQL; un bump non tocca il sorgente,
  # e il merge resta coperto dal Deploy come descritto sopra.
  sonar:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: astro-project/package-lock.json
      - name: Installa
        working-directory: astro-project
        run: npm ci
      # I test di astro-project leggono dist/: senza build muoiono con ENOENT.
      - name: Build
        working-directory: astro-project
        run: npm run build
      - name: Coverage
        run: |
          npm run test:coverage --prefix astro-project
          npm run test:coverage --prefix engine
      - name: Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
