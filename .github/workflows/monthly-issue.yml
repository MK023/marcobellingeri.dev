name: Genera numero mensile dell'archivio

# Gira in automatico il 1° di ogni mese alle 06:00 UTC, oppure a mano da
# GitHub ("Run workflow"). Il secret FIRECRAWL_API_KEY è sincronizzato nei
# GitHub Actions secrets da Doppler (config prd) — non va aggiunto a mano.
on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-issue:
    runs-on: ubuntu-latest
    # Lo script e i dati vivono in astro-project/ (il checkout è alla root del repo).
    defaults:
      run:
        working-directory: astro-project
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install firecrawl-py

      - name: Genera il numero del mese
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python firecrawl_issue.py

      - name: Committa il nuovo numero, se presente
        run: |
          git config user.name "archive-bot"
          git config user.email "archive-bot@users.noreply.github.com"
          git add public/data/issues/
          git diff --cached --quiet || git commit -m "Archivio: nuovo numero mensile [skip ci]"
          git push
