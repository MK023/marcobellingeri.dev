# Analisi SonarQube Cloud (organizzazione mk023, regione EU).
#
# `sonar.host.url` non si imposta: la doc dice di non usarlo con gli scanner
# recenti, che puntano da soli alla regione EU. Metterlo è un modo per sbagliare.
#
# I tre warning della prima analisi automatica nascevano tutti da qui:
#  - encoding: lo scanner leggeva i binari tracciati (cv-*.pdf, og.png, favicon.ico)
#    come fossero sorgente. Ora `sonar.sources` non li comprende più.
#  - Python: senza versione dichiarata l'analisi vale per "tutte le Python 3",
#    cioè per nessuna in particolare.
#  - tsconfig: `astro/tsconfigs/strict` sta in node_modules, quindi lo scan gira
#    dopo `npm ci` (vedi i workflow).
sonar.projectKey=MK023_marcobellingeri.dev
sonar.organization=mk023

sonar.sources=astro-project/src,astro-project/worker,engine,scripts,supabase
sonar.tests=astro-project/test,engine/test

# `engine` è sorgente, ma i suoi test no: un file indicizzato due volte fa fallire
# l'analisi. node_modules e coverage non sono codice di nessuno.
sonar.exclusions=**/node_modules/**,**/coverage/**,engine/test/**

sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Il warning "Data Dictionary is not configured" (S3641/S3921/S3618/S3651) NON è
# risolvibile qui: quelle regole vogliono una connessione JDBC a un Oracle vivo
# (sonar.plsql.jdbc.url) per leggere SYS.ALL_TAB_COLUMNS. Le migrations sono
# Postgres/Supabase: quell'Oracle non esiste. Warning informativo, zero effetti
# su gate e rating. Documentato per non rincorrerlo a ogni analisi.

# La coverage misura il runtime che PUÒ girare sotto node:test:
#  - scripts/genera-cv.py gira solo sul Mac di Marco (textutil+Chrome+.docx che
#    non stanno nel repo): in CI non può eseguire, un rig pytest sarebbe teatro.
#  - astro-project/src/** è codice lato Astro (content.config importa moduli
#    virtuali astro:*): la sua verifica vera sono i test su dist/, che controllano
#    l'output costruito — più di quanto farebbe una unit sul sorgente.
#  - worker/sentry.js è la sola init Sentry, 1 riga senza logica.
sonar.coverage.exclusions=scripts/**,astro-project/src/**,astro-project/worker/sentry.js

# Prodotti dal test runner di Node (nessuna dipendenza aggiunta). I percorsi dentro
# i .info sono relativi alla cartella dove girano i test: la CI li riscrive
# relativi alla radice, altrimenti Sonar non risolve i file e la coverage è zero.
sonar.javascript.lcov.reportPaths=astro-project/coverage/lcov.info,engine/coverage/lcov.info
